name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT || 22 }}
        script: |
          set -e
          echo "🚀 Starting deployment..."
          
          # Navigate to project
          cd /opt/ihaleli-batak
          
          # 1. Stop Server (Optional/Safety)
          # echo "Stopping server..."
          # pm2 stop batak-server || true
          
          # 2. Pull Code
          echo "Pulling latest code..."
          git fetch --all
          git reset --hard origin/main
          
          # 3. Build Backend
          echo "Building backend..."
          cd server
          npm install --production
          
          # 4. Build Frontend
          echo "Building frontend..."
          cd ../client
          npm install
          npm run build
          
          # 5. Deploy Frontend Files
          echo "Deploying frontend files..."
          # Ensure permissions or use sudo if needed. Assuming current user has access to /var/www/batak
          # If not, you might need: echo "${{ secrets.VPS_PASSWORD }}" | sudo -S mkdir ...
          mkdir -p /var/www/batak
          rm -rf /var/www/batak/*
          cp -r dist/* /var/www/batak/
          
          # 6. Restart Server
          echo "Restarting server..."
          cd ../server
          pm2 restart batak-server || pm2 start index.js --name "batak-server"
          pm2 save
          
          echo "✅ Deployment finished successfully!"
